[user]
natural_key = ["first_name", "last_name"]
[user.columns]
first_name = "varchar"
last_name = "varchar"
birthdate = "date"

[blog]
natural_key = ["title"]
primary_key = ""
not_null = ["user"]
[blog.columns]
title = "text"
length = "int"
user = "bigint"
[blog.foreign_keys]
user = "user"


[top_user]
as_select = """
SELECT user FROM blog GROUP BY user ORDER BY count() LIMIT 3
"""
[top_user.columns]
user = "bigint"
[top_user.foreign_keys]
user = "user"
